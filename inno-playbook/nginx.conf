server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml application/wasm;

    # Long-lived cache for hashed Next.js assets (_next/static/*)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Dynamic route: /initiatives/[id] ─────────────────────────────────────
    # Next.js static export only pre-generates /initiatives/_/index.html
    # This block rewrites any real initiative ID to serve the _ placeholder HTML
    # The browser URL stays as the real ID — useParams() reads it correctly
    # Works with or without basePath (e.g. /innovation_platform/initiatives/[id])
    location ~ "initiatives/[^_/][^/]*" {
        rewrite "^(.*)/initiatives/[^/]+(.*)" $1/initiatives/_$2 last;
    }

    # Short cache for HTML pages
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # SPA fallback — try file, then directory, then index.html
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
}
